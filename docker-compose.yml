services:
  web:
    container_name: d4l-app-dev
    image: d4l-webapp:dev
    build:
      context: .
      target: dev
      secrets:
        - npm_token
    ports:
      - '3000:3000'
      - '51212:51212'
    volumes:
      - .:/app
      - d4l_web_node_modules:/app/node_modules
      - d4l_web_prisma_client:/app/prisma/client

volumes:
  d4l_web_node_modules:
  d4l_web_prisma_client:

secrets:
  npm_token:
    environment: NPM_TOKEN
