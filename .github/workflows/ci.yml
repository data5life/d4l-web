name: CI Pipeline
on:
  push:
    branches: [dev, main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [dev, main]

jobs:
  build-deps:
    if: github.event.pull_request.draft == false
    name: Build deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build deps
        uses: docker/build-push-action@v7
        with:
          context: .
          target: deps
          cache-from: type=gha,scope=deps
          cache-to: type=gha,mode=max,scope=deps
          tags: d4l-webapp:deps
          secrets: |
            "npm_token=${{ secrets.NPM_TOKEN }}"

  unit-tests:
    needs: build-deps
    name: Unit Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build test-unit
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test-unit
          load: true
          cache-from: |
            type=gha,scope=deps
            type=gha,scope=test-unit
          cache-to: type=gha,mode=max,scope=test-unit
          tags: d4l-webapp:test-unit
          secrets: |
            "npm_token=${{ secrets.NPM_TOKEN }}"
      - name: Validate
        run: make validate
      - name: Jest
        run: make test-unit

  e2e-tests:
    needs: build-deps
    name: E2E Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build playwright
        uses: docker/build-push-action@v7
        with:
          context: .
          target: playwright
          load: true
          cache-from: |
            type=gha,scope=deps
            type=gha,scope=playwright
          cache-to: type=gha,mode=max,scope=playwright
          tags: d4l-webapp:playwright
          secrets: |
            "npm_token=${{ secrets.NPM_TOKEN }}"
      - name: Build migrate
        uses: docker/build-push-action@v7
        with:
          context: .
          target: migrate
          load: true
          cache-from: |
            type=gha,scope=deps
            type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate
          tags: d4l-migrate-db:test
          secrets: |
            "npm_token=${{ secrets.NPM_TOKEN }}"
      - name: Build app
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          load: true
          cache-from: |
            type=gha,scope=deps
            type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
          build-args: |
            SENSORHUB_URL=http://mock-server:3001/sensorhub/api
            MOCK_DONATION_CLIENT=true
          tags: d4l-webapp:test
          secrets: |
            "npm_token=${{ secrets.NPM_TOKEN }}"
      - name: Playwright
        run: make test-e2e
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
